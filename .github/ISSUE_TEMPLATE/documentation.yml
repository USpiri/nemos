name: Documentation
description: Report missing, incorrect, or unclear documentation
title: "docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the docs by describing what's missing or wrong.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Missing documentation
        - Incorrect documentation
        - Unclear / hard to follow
        - Outdated documentation
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Where is the documentation issue? (URL, file path, or section name)
      placeholder: "e.g. README.md, CONTRIBUTING.md, in-app tooltip for X"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong or missing? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: If you have a suggestion for how to fix or improve it, describe it here.
